name: AI Daily to Feishu

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      force_send:
        description: 'Force push for testing'
        required: false
        default: 'false'

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Push to Feishu
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python rss_to_feishu.py
