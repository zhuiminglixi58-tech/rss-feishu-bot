name: AI Daily to Feishu

on:
  schedule:
    - cron: '0 1 * * *'   # 北京时间每天早上 9:00
  workflow_dispatch:
    inputs:
      force_send:
        description: '强制推送（测试用）'
        required: false
        default: 'false'

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Push to Feishu
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # 自动提供，无需手动设置
        run: python rss_to_feishu.py   # 保持原文件名不变
```

