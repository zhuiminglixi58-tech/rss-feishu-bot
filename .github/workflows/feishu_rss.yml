name: AI Daily to Feishu

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      force_send:
        description: 'Force push for testing'
        required: false
        default: 'false'

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install fonts
        run: |
          sudo apt-get update -q
          sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: pip install requests Pillow

      - name: Push to Feishu and generate image
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
          IMGBB_KEY: ${{ secrets.IMGBB_KEY }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
        run: python rss_to_feishu.py

      - name: Upload daily image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-image
          path: daily_report.png
          retention-days: 7
